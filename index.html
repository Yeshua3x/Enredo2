<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sombras da Fé | Mini-Série Bíblica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --accent: #d4a574;
            --accent-glow: #d4a57440;
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --glass: rgba(255,255,255,0.05);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            line-height: 1.7; 
            overflow-x: hidden;
        }

        header { 
            position: fixed; top: 0; left: 0; right: 0; 
            height: 60px; 
            backdrop-filter: blur(20px); 
            background: var(--glass); 
            border-bottom: 1px solid var(--glass); 
            z-index: 1000; 
            padding: 0 5%; 
            display: flex; align-items: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo { 
            font-size: 1.4rem; 
            font-weight: 700; 
            background: linear-gradient(135deg, var(--accent), #f4d4a5); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-right: auto; 
        }
        .hamburger { 
            display: none; 
            flex-direction: column; 
            width: 25px; height: 20px; 
            cursor: pointer; z-index: 1001;
        }
        .hamburger span { 
            width: 100%; height: 3px; 
            background: var(--text-primary); 
            transition: 0.3s; 
            border-radius: 2px; margin: 2px 0;
        }
        .hamburger.active span:nth-child(1) { 
            transform: rotate(45deg) translateY(7px) translateX(7px); 
        }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { 
            transform: rotate(-45deg) translateY(-7px) translateX(7px); 
        }

        nav { display: flex; gap: 2rem; }
        nav a, .mobile-menu a { 
            color: var(--text-primary); 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.95rem; 
            opacity: 0.8; 
            transition: 0.3s;
        }
        nav a:hover, nav a.active, .mobile-menu a:hover, .mobile-menu a.active { 
            opacity: 1; color: var(--accent); 
        }
        .mobile-menu { 
            position: fixed; top: 60px; left: 0; right: 0; 
            background: var(--bg-secondary); 
            backdrop-filter: blur(20px); 
            transform: translateY(-100%); 
            opacity: 0; 
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            padding: 2rem 5%; z-index: 999;
        }
        .mobile-menu.active { transform: translateY(0); opacity: 1; }
        .mobile-menu a { display: block; padding: 1rem 0; font-size: 1.2rem; border-bottom: 1px solid var(--glass); }

        main { padding-top: 100px; padding-bottom: 5rem; max-width: 900px; margin: 0 auto; padding: 0 5%; }
        
        .hero { text-align: center; margin-bottom: 4rem; }
        .hero h1 { 
            font-size: clamp(2.5rem, 6vw, 4.5rem); 
            font-weight: 700; 
            background: linear-gradient(135deg, var(--accent), #f4d4a5); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 1rem; 
        }
        .hero p { font-size: 1.3rem; opacity: 0.9; max-width: 600px; margin: 0 auto; }
        .verse { font-style: italic; opacity: 0.8; margin-top: 1rem; }

        .episodes { display: grid; gap: 2rem; }
        .episode-card { 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--glass); 
            border-radius: 20px; 
            padding: 2.5rem; 
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            cursor: pointer; 
            position: relative; overflow: hidden;
        }
        .episode-card::before { 
            content: ''; 
            position: absolute; top: 0; left: 0; right: 0; 
            height: 4px; 
            background: linear-gradient(90deg, var(--accent), transparent); 
        }
        .episode-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 25px 50px var(--accent-glow); 
            border-color: var(--accent);
        }
        .episode-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .ep-number { 
            width: 50px; height: 50px; 
            background: var(--accent); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 1.2rem; 
        }
        .episode-card h3 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
        .cliffhanger { 
            background: rgba(212,165,116,0.1); 
            border: 1px solid rgba(212,165,116,0.2); 
            padding: 1.5rem; 
            border-radius: 12px; 
            margin-top: 1.5rem;
            font-weight: 600; font-size: 1.1rem;
        }
        .fans { 
            background: rgba(255,255,255,0.02); 
            padding: 1rem; 
            border-radius: 10px; 
            font-size: 0.9rem; 
            opacity: 0.7; 
            margin-top: 1rem;
        }
        .loading { text-align: center; padding: 3rem; font-size: 1.2rem; opacity: 0.6; }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            nav { display: none; }
            .episode-card { padding: 2rem 1.5rem; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-glow); border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">SOMBRAS DA FÉ</div>
        <nav>
            <a href="#home" class="active">Início</a>
            <a href="#episodios">Episódios</a>
            <a href="dia-seguinte.html">Ep. 4</a>
        </nav>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="#home">Início</a>
            <a href="#episodios">Episódios</a>
            <a href="dia-seguinte.html">Ep. 4</a>
        </div>
    </header>

    <main>
        <section class="hero" id="home">
            <h1>Sombras da Fé</h1>
            <p>Um jovem cristão enfrenta provações espirituais em Recife. <strong>"Sede fortes e corajosos. Não temas..."</strong></p>
            <p class="verse">Josué 1:9</p>
        </section>

        <section class="episodes" id="episodios">
            <div class="loading">Carregando capítulos bíblicos...</div>
        </section>
    </main>

    <script>
        let episodesData = {};
        
        async function loadEpisodesData() {
            try {
                const response = await fetch('enredo.json');
                episodesData = await response.json();
                document.querySelector('.loading').remove();
                renderEpisodes();
            } catch (error) {
                document.querySelector('.loading').innerHTML = 'Erro ao carregar capítulos. Verifique enredo.json';
            }
        }

        function renderEpisodes() {
            const container = document.querySelector('.episodes');
            container.innerHTML = '';

            Object.keys(episodesData).forEach(key => {
                const ep = episodesData[key];
                const card = document.createElement('div');
                card.className = 'episode-card';
                card.onclick = () => openEpisodeModal(key);
                card.innerHTML = `
                    <div class="episode-header">
                        <div class="ep-number">${ep.number}</div>
                        <h3>${ep.title}</h3>
                    </div>
                    <p>${ep.preview}</p>
                    <div class="cliffhanger">${ep.cliffhanger}</div>
                    <div class="fans">
                        <strong>Irmãos comentam:</strong><br>
                        ${ep.fans.map(fan => fan).join('<br>')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openEpisodeModal(epKey) {
            const ep = episodesData[epKey];
            alert(`📖 CAPÍTULO ${ep.number} - ${ep.title}\n\n${ep.fullContent}\n\n🔥${ep.cliffhanger}\n\n🙏 ${ep.fans.join('\n')}`);
        }

        function toggleMenu() {
            document.querySelector('.hamburger').classList.toggle('active');
            document.getElementById('mobileMenu').classList.toggle('active');
        }

        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = this.getAttribute('href').substring(1);
                navigateTo(target);
                toggleMenu();
            });
        });

        function navigateTo(page) {
            document.querySelectorAll('nav a, .mobile-menu a').forEach(a => a.classList.remove('active'));
            document.querySelectorAll(`a[href="#${page}"]`).forEach(a => a.classList.add('active'));
            
            if (page === 'home') {
                document.querySelector('.hero').scrollIntoView({ behavior: 'smooth' });
            } else if (page === 'episodios') {
                document.getElementById('episodios').scrollIntoView({ behavior: 'smooth' });
            }
        }

        window.addEventListener('scroll', () => {
            document.querySelector('header').style.background = `rgba(10,10,10,${Math.min(0.1 + window.scrollY * 0.0005, 0.2)})`;
        });

        loadEpisodesData();
    </script>
</body>
</html>
